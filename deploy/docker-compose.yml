services:
  modelfoundry:
    build:
      context: /home/bailey/model-foundry
    container_name: modelfoundry
    restart: unless-stopped
    user: "${MODELFOUNDRY_UID:-1000}:${MODELFOUNDRY_GID:-1000}"
    ports:
      - "127.0.0.1:${MODELFOUNDRY_PORT:-7352}:7352"
      - "${MODELFOUNDRY_LAN_BIND:-172.16.24.250}:${MODELFOUNDRY_PORT:-7352}:7352"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      HOME: /config
      MODELFOUNDRY_HERMES_PROXY_BASE_URL: ${MODELFOUNDRY_HERMES_PROXY_BASE_URL:-http://host.docker.internal:8648/v1}
      MODELFOUNDRY_INBOUND_API_KEYS: ${MODELFOUNDRY_INBOUND_API_KEYS:-}
    volumes:
      - ./config:/config
    networks:
      - default
      - traefik_proxy

networks:
  traefik_proxy:
    external: true
